<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Финансовый Дашборд</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-main: #f4f5f6;
            --bg-card: #ffffff;
            --text-main: #2d3135;
            --text-muted: #6c757d;
            --border-color: #e2e5e8;
            --primary: #4f46e5;
            --accent-gray: #e9ecef;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); padding: 24px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 1200px; }
        header { margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 24px; font-weight: 700; color: #1a1d20; }
        header p { color: var(--text-muted); font-size: 14px; margin-top: 4px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border-color); padding: 20px; border-radius: 12px; }
        .stat-card .title { font-size: 13px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; }
        .stat-card .value { font-size: 24px; font-weight: 700; margin-top: 8px; color: #1a1d20; }
        .stat-card.total-card { border-left: 5px solid var(--primary); }
        .main-layout { display: grid; grid-template-columns: 1fr 350px; gap: 24px; margin-bottom: 24px; }
        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
        .card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 24px; }
        .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
        .filters { display: flex; flex-direction: column; gap: 12px; }
        .filter-group { display: flex; flex-direction: column; gap: 6px; }
        .filter-group label { font-size: 12px; font-weight: 600; color: var(--text-muted); }
        .filter-group select, .filter-group input { padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); width: 100%; outline: none; }
        .reset-btn { margin-top: 8px; padding: 10px; background: var(--accent-gray); border: none; border-radius: 8px; cursor: pointer; font-weight: 500; }
        .table-wrapper { max-height: 500px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th { background: #fafbfc; padding: 12px 16px; font-weight: 600; color: var(--text-muted); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 10; }
        td { padding: 12px 16px; border-bottom: 1px solid var(--border-color); }
        .sum-cell { font-weight: 600; }
        #loading { font-weight: 600; color: var(--primary); margin-bottom: 15px; background: #e0e7ff; padding: 12px; border-radius: 8px; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>Мой Финансовый Учёт</h1>
            <p>Живой дашборд расходов из Google Таблицы</p>
        </div>
    </header>

    <div id="loading">Синхронизация данных со скриптом...</div>

    <div class="stats-grid">
        <div class="stat-card total-card">
            <div class="title">Всего отфильтровано</div>
            <div class="value" id="total-sum">0 ₽</div>
        </div>
        <div class="stat-card">
            <div class="title">Личная еда (Я)</div>
            <div class="value" id="food-sum">0 ₽</div>
        </div>
        <div class="stat-card">
            <div class="title">Всего на авто</div>
            <div class="value" id="car-sum">0 ₽</div>
        </div>
        <div class="stat-card">
            <div class="title">Доставка еды</div>
            <div class="value" id="delivery-sum">0 ₽</div>
        </div>
    </div>

    <div class="main-layout">
        <div class="card" style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <h2>Структура расходов по категориям</h2>
            <div style="width: 100%; max-width: 360px;">
                <canvas id="expenseChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h2>Фильтрация данных</h2>
            <div class="filters">
                <div class="filter-group">
                    <label>Объект / Член семьи</label>
                    <select id="objectFilter" onchange="applyFilters()">
                        <option value="all">Все объекты</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Категория трат</label>
                    <select id="categoryFilter" onchange="applyFilters()">
                        <option value="all">Все категории</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>День месяца</label>
                    <input type="number" id="dateFilter" min="1" max="31" placeholder="Например: 11" oninput="applyFilters()">
                </div>
                <button class="reset-btn" onclick="resetFilters()">Сбросить фильтры</button>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>Детализация расходов</h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Дата</th>
                        <th>Объект</th>
                        <th>Категория</th>
                        <th>Описание</th>
                        <th>Сумма</th>
                    </tr>
                </thead>
                <tbody id="table-body">

                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Твоя проверенная рабочая ссылка на веб-приложение
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzfRHkj7VC8WmQPhtaYs4Z7YCbpgDnV9ByC7x2Xr4DrNHwo35YZ1ZOKZnatKdVXbrnK/exec"; 
    
    let expenses = [];
    let chart;

    // Загрузка живых данных из Google Sheets
    async function loadData() {
        try {
            const response = await fetch(APPS_SCRIPT_URL, { redirect: 'follow' });
            if (!response.ok) throw new Error('Ошибка сети');
            
            expenses = await response.json(); 
            
            if(document.getElementById('loading')) {
                document.getElementById('loading').style.display = 'none';
            }
            
            initFilters();
            calculateStaticCards();
            applyFilters();
        } catch (error) {
            if(document.getElementById('loading')) {
                document.getElementById('loading').innerText = "❌ Ошибка загрузки. Проверьте обновление версии Apps Script!";
            }
            console.error(error);
        }
    }

    // Заполнение выпадающих списков фильтров
    function initFilters() {
        const objects = new Set(); 
        const categories = new Set();
        
        expenses.forEach(e => { 
            if (e.object) objects.add(e.object); 
            if (e.category) categories.add(e.category); 
        });
        
        const objSel = document.getElementById('objectFilter');
        if (objSel) {
            objects.forEach(o => { 
                let opt = document.createElement('option'); 
                opt.value = o; opt.innerText = o; 
                objSel.appendChild(opt); 
            });
        }
        
        const catSel = document.getElementById('categoryFilter');
        if (catSel) {
            categories.forEach(c => { 
                let opt = document.createElement('option'); 
                opt.value = c; opt.innerText = c; 
                catSel.appendChild(opt); 
            });
        }
    }

    // Расчет сумм для верхних статических карточек
    function calculateStaticCards() {
        let food = 0, car = 0, delivery = 0;
        
        expenses.forEach(e => {
            if (e.category === "Я (Обеды / Перекусы)") food += e.amount;
            if (e.category === "Машина") car += e.amount;
            
            const desc = (e.desc || "").toLowerCase();
            if (desc.includes("доставка") || desc.includes("еда мак") || desc.includes("мак еда") || desc.includes("автосуши") || desc.includes("яндекс еда") || desc.includes("додо")) {
                delivery += e.amount;
            }
        });

        if(document.getElementById('food-sum')) document.getElementById('food-sum').innerText = food.toLocaleString() + ' ₽';
        if(document.getElementById('car-sum')) document.getElementById('car-sum').innerText = car.toLocaleString() + ' ₽';
        if(document.getElementById('delivery-sum')) document.getElementById('delivery-sum').innerText = delivery.toLocaleString() + ' ₽';
    }

    // Логика фильтрации
    function applyFilters() {
        const objVal = document.getElementById('objectFilter').value;
        const catVal = document.getElementById('categoryFilter').value;
        const dateVal = document.getElementById('dateFilter').value;

        const filtered = expenses.filter(e => {
            const mObj = (objVal === 'all' || e.object === objVal);
            const mCat = (catVal === 'all' || e.category === catVal);
            let mDate = true;
            if(dateVal) { 
                mDate = e.date.startsWith(dateVal.padStart(2, '0')); 
            }
            return mObj && mCat && mDate;
        });

        const tbody = document.getElementById('table-body');
        if (tbody) {
            tbody.innerHTML = '';
            filtered.forEach(e => {
                tbody.innerHTML += `<tr>
                    <td>${e.date}</td>
                    <td>${e.object}</td>
                    <td>${e.category}</td>
                    <td>${e.desc}</td>
                    <td class="sum-cell">${e.amount.toLocaleString()} ₽</td>
                </tr>`;
            });
        }

        let total = filtered.reduce((sum, e) => sum + e.amount, 0);
        if(document.getElementById('total-sum')) {
            document.getElementById('total-sum').innerText = total.toLocaleString() + ' ₽';
        }
        
        updateChart(filtered);
    }

    // Безопасное обновление диаграммы Chart.js
    function updateChart(data) {
        try {
            const totals = {};
            data.forEach(e => { totals[e.category] = (totals[e.category] || 0) + e.amount; });
            
            if (typeof Chart === 'undefined') return;

            if (chart) chart.destroy();
            chart = new Chart(document.getElementById('expenseChart').getContext('2d'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(totals),
                    datasets: [{ 
                        data: Object.values(totals), 
                        backgroundColor: [
                            '#4f46e5', '#10b981', '#f59e0b', '#ef4444', 
                            '#8b5cf6', '#ec4899', '#3b82f6', '#6b7280',
                            '#14b8a6', '#f43f5e', '#a855f7', '#64748b'
                        ],
                        borderWidth: 2,
                        borderColor: '#ffffff'
                    }]
                },
                options: { 
                    responsive: true, 
                    plugins: { 
                        legend: { 
                            position: 'bottom', 
                            labels: { boxWidth: 10, font: { size: 10 } } 
                        } 
                    } 
                }
            });
        } catch (err) {
            console.error("Ошибка графика:", err);
        }
    }

    function resetFilters() {
        document.getElementById('objectFilter').value = 'all';
        document.getElementById('categoryFilter').value = 'all';
        document.getElementById('dateFilter').value = '';
        applyFilters();
    }

    // Старт
    loadData();
</script>
</body>
</html>
